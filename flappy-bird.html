<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game dimensions (classic Flappy Bird aspect ratio)
const W = 288;
const H = 512;
canvas.width = W;
canvas.height = H;

// Scale canvas to fit screen
function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.95;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Audio context for sound effects
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(type) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;

  if (type === 'flap') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.08);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  } else if (type === 'score') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.setValueAtTime(1100, now + 0.06);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === 'hit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  } else if (type === 'die') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now);
    osc.stop(now + 0.5);
  }
}

// Colors
const COLORS = {
  sky: '#4EC0CA',
  skyBottom: '#E8FCE8',
  ground: '#DED895',
  groundDark: '#DAD085',
  groundLine: '#54803A',
  pipeGreen: '#74BF2E',
  pipeDarkGreen: '#548F1A',
  pipeHighlight: '#8ED844',
  pipeCap: '#5A9E1E',
  birdYellow: '#F8C83C',
  birdOrange: '#E8841A',
  birdWhite: '#FFFFFF',
  birdEye: '#000000',
  birdBeak: '#EB4F2A',
  birdWing: '#E8A03C',
};

// Game state
const STATES = { MENU: 0, PLAYING: 1, DYING: 2, DEAD: 3 };
let state = STATES.MENU;
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyBest') || '0');
let frameCount = 0;

// Ground
const GROUND_Y = H - 112;
let groundX = 0;

// Bird
const bird = {
  x: 68,
  y: 0,
  w: 34,
  h: 24,
  velocity: 0,
  rotation: 0,
  flapFrame: 0,
  flapSpeed: 8,
};

const GRAVITY = 0.5;
const FLAP_POWER = -8;
const MAX_VELOCITY = 12;
const ROTATION_UP = -25 * Math.PI / 180;
const ROTATION_DOWN = 90 * Math.PI / 180;

// Pipes
let pipes = [];
const PIPE_WIDTH = 52;
const PIPE_GAP = 120;
const PIPE_SPEED = 2;
const PIPE_SPACING = 180;

// Medal thresholds
const BRONZE = 10;
const SILVER = 20;
const GOLD = 30;
const PLATINUM = 40;

function resetGame() {
  bird.y = H / 2 - 20;
  bird.velocity = 0;
  bird.rotation = 0;
  bird.flapFrame = 0;
  pipes = [];
  score = 0;
  frameCount = 0;
}

function flap() {
  if (state === STATES.MENU) {
    resetGame();
    state = STATES.PLAYING;
    bird.velocity = FLAP_POWER;
    playSound('flap');
  } else if (state === STATES.PLAYING) {
    bird.velocity = FLAP_POWER;
    playSound('flap');
  } else if (state === STATES.DEAD) {
    state = STATES.MENU;
    resetGame();
  }
}

// Input
canvas.addEventListener('mousedown', (e) => { e.preventDefault(); flap(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

// Draw bird
function drawBird(x, y, rotation, frame) {
  ctx.save();
  ctx.translate(x + bird.w / 2, y + bird.h / 2);
  ctx.rotate(rotation);

  // Body
  ctx.fillStyle = COLORS.birdYellow;
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = COLORS.birdOrange;
  ctx.beginPath();
  ctx.ellipse(2, 4, bird.w / 2 - 4, bird.h / 2 - 4, 0, 0.3, Math.PI - 0.3);
  ctx.fill();

  // Wing
  const wingFlap = Math.sin(frame * 0.6) * 5;
  ctx.fillStyle = COLORS.birdWing;
  ctx.beginPath();
  ctx.ellipse(-2, wingFlap, 10, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Eye (white)
  ctx.fillStyle = COLORS.birdWhite;
  ctx.beginPath();
  ctx.arc(8, -5, 5, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = COLORS.birdEye;
  ctx.beginPath();
  ctx.arc(10, -5, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = COLORS.birdBeak;
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.lineTo(22, 2);
  ctx.lineTo(12, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// Draw pipe
function drawPipe(x, topHeight) {
  // Top pipe body
  ctx.fillStyle = COLORS.pipeGreen;
  ctx.fillRect(x, 0, PIPE_WIDTH, topHeight);
  // Top pipe highlight
  ctx.fillStyle = COLORS.pipeHighlight;
  ctx.fillRect(x + 3, 0, 5, topHeight);
  // Top pipe dark edge
  ctx.fillStyle = COLORS.pipeDarkGreen;
  ctx.fillRect(x + PIPE_WIDTH - 6, 0, 6, topHeight);

  // Top pipe cap
  const capH = 26;
  ctx.fillStyle = COLORS.pipeCap;
  ctx.fillRect(x - 3, topHeight - capH, PIPE_WIDTH + 6, capH);
  ctx.fillStyle = COLORS.pipeHighlight;
  ctx.fillRect(x, topHeight - capH + 2, 5, capH - 4);
  ctx.fillStyle = COLORS.pipeDarkGreen;
  ctx.fillRect(x + PIPE_WIDTH - 3, topHeight - capH + 2, 5, capH - 4);
  // Cap border
  ctx.strokeStyle = COLORS.pipeDarkGreen;
  ctx.lineWidth = 1;
  ctx.strokeRect(x - 3, topHeight - capH, PIPE_WIDTH + 6, capH);

  // Bottom pipe
  const bottomY = topHeight + PIPE_GAP;
  ctx.fillStyle = COLORS.pipeGreen;
  ctx.fillRect(x, bottomY, PIPE_WIDTH, GROUND_Y - bottomY);
  ctx.fillStyle = COLORS.pipeHighlight;
  ctx.fillRect(x + 3, bottomY, 5, GROUND_Y - bottomY);
  ctx.fillStyle = COLORS.pipeDarkGreen;
  ctx.fillRect(x + PIPE_WIDTH - 6, bottomY, 6, GROUND_Y - bottomY);

  // Bottom pipe cap
  ctx.fillStyle = COLORS.pipeCap;
  ctx.fillRect(x - 3, bottomY, PIPE_WIDTH + 6, capH);
  ctx.fillStyle = COLORS.pipeHighlight;
  ctx.fillRect(x, bottomY + 2, 5, capH - 4);
  ctx.fillStyle = COLORS.pipeDarkGreen;
  ctx.fillRect(x + PIPE_WIDTH - 3, bottomY + 2, 5, capH - 4);
  ctx.strokeStyle = COLORS.pipeDarkGreen;
  ctx.strokeRect(x - 3, bottomY, PIPE_WIDTH + 6, capH);
}

// Draw sky background
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, COLORS.sky);
  grad.addColorStop(1, COLORS.skyBottom);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Simple clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 3; i++) {
    const cx = ((i * 120 + 30 - groundX * 0.2) % (W + 80)) - 40;
    const cy = 60 + i * 40;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 30, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 20, cy - 5, 25, 14, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - 15, cy + 2, 20, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Draw ground
function drawGround() {
  ctx.fillStyle = COLORS.groundLine;
  ctx.fillRect(0, GROUND_Y, W, 2);
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, GROUND_Y + 2, W, 110);

  // Ground stripes
  ctx.fillStyle = COLORS.groundDark;
  for (let x = -groundX % 24; x < W; x += 24) {
    ctx.fillRect(x, GROUND_Y + 2, 12, 14);
  }
}

// Draw score with outline
function drawScore(num, x, y, size) {
  ctx.font = `bold ${size}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // Outline
  ctx.strokeStyle = '#543847';
  ctx.lineWidth = 4;
  ctx.strokeText(num, x, y);
  // Fill
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(num, x, y);
}

// Draw medal
function drawMedal(x, y, score) {
  let color, shine;
  if (score >= PLATINUM) { color = '#E8E8E8'; shine = '#FFFFFF'; }
  else if (score >= GOLD) { color = '#F0C040'; shine = '#FFF0A0'; }
  else if (score >= SILVER) { color = '#C0C0C0'; shine = '#E8E8E8'; }
  else if (score >= BRONZE) { color = '#CD7F32'; shine = '#E8A860'; }
  else return;

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = shine;
  ctx.beginPath();
  ctx.arc(x - 5, y - 5, 6, 0, Math.PI * 2);
  ctx.fill();

  // Star
  ctx.fillStyle = '#543847';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u2605', x, y + 1);
}

// Scoreboard panel
function drawScoreboard() {
  const pw = 226;
  const ph = 114;
  const px = (W - pw) / 2;
  const py = 160;

  // Panel
  ctx.fillStyle = '#DED895';
  ctx.strokeStyle = '#543847';
  ctx.lineWidth = 3;
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeRect(px, py, pw, ph);

  // Inner border
  ctx.strokeStyle = '#8D6E53';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 6, py + 6, pw - 12, ph - 12);

  // Score label
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#543847';
  ctx.fillText('SCORE', px + 70, py + 24);
  ctx.textAlign = 'right';
  ctx.fillText(score, px + pw - 18, py + 24);

  // Best label
  ctx.textAlign = 'left';
  ctx.fillText('BEST', px + 70, py + 60);
  ctx.textAlign = 'right';
  ctx.fillText(bestScore, px + pw - 18, py + 60);

  // Medal
  drawMedal(px + 36, py + 52, score);

  // New best indicator
  if (score > 0 && score >= bestScore) {
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('NEW!', px + pw - 40, py + 46);
  }
}

// Collision detection
function checkCollision() {
  // Ground/ceiling
  if (bird.y + bird.h >= GROUND_Y || bird.y <= 0) return true;

  // Pipes
  const bx = bird.x + 4;
  const by = bird.y + 4;
  const bw = bird.w - 8;
  const bh = bird.h - 8;

  for (const pipe of pipes) {
    const px = pipe.x;
    const topH = pipe.topHeight;
    const bottomY = topH + PIPE_GAP;

    // Horizontal overlap
    if (bx + bw > px - 3 && bx < px + PIPE_WIDTH + 3) {
      // Top pipe or bottom pipe
      if (by < topH || by + bh > bottomY) return true;
    }
  }
  return false;
}

// Main update
function update() {
  frameCount++;

  if (state === STATES.MENU) {
    // Bird bobs up and down on menu
    bird.y = H / 2 - 20 + Math.sin(frameCount * 0.06) * 10;
    bird.flapFrame = frameCount;
    groundX += PIPE_SPEED;
  }

  if (state === STATES.PLAYING) {
    // Bird physics
    bird.velocity += GRAVITY;
    if (bird.velocity > MAX_VELOCITY) bird.velocity = MAX_VELOCITY;
    bird.y += bird.velocity;
    bird.flapFrame = frameCount;

    // Bird rotation
    if (bird.velocity < 0) {
      bird.rotation = ROTATION_UP;
    } else {
      bird.rotation += 0.04;
      if (bird.rotation > ROTATION_DOWN) bird.rotation = ROTATION_DOWN;
    }

    // Scroll ground
    groundX += PIPE_SPEED;

    // Spawn pipes
    if (pipes.length === 0 || pipes[pipes.length - 1].x < W - PIPE_SPACING) {
      const minTop = 50;
      const maxTop = GROUND_Y - PIPE_GAP - 50;
      const topH = minTop + Math.random() * (maxTop - minTop);
      pipes.push({ x: W, topHeight: topH, scored: false });
    }

    // Move pipes
    for (const pipe of pipes) {
      pipe.x -= PIPE_SPEED;

      // Score
      if (!pipe.scored && pipe.x + PIPE_WIDTH < bird.x) {
        pipe.scored = true;
        score++;
        playSound('score');
      }
    }

    // Remove off-screen pipes
    pipes = pipes.filter(p => p.x > -PIPE_WIDTH - 10);

    // Collision
    if (checkCollision()) {
      state = STATES.DYING;
      playSound('hit');
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', bestScore.toString());
      }
      // Short delay then die sound
      setTimeout(() => playSound('die'), 200);
    }
  }

  if (state === STATES.DYING) {
    bird.velocity += GRAVITY;
    bird.y += bird.velocity;
    bird.rotation += 0.06;
    if (bird.rotation > ROTATION_DOWN) bird.rotation = ROTATION_DOWN;

    if (bird.y + bird.h >= GROUND_Y) {
      bird.y = GROUND_Y - bird.h;
      state = STATES.DEAD;
    }
  }
}

// Main render
function render() {
  ctx.clearRect(0, 0, W, H);

  drawBackground();

  // Pipes
  for (const pipe of pipes) {
    drawPipe(pipe.x, pipe.topHeight);
  }

  drawGround();

  // Bird
  drawBird(bird.x, bird.y, bird.rotation, bird.flapFrame);

  // UI based on state
  if (state === STATES.MENU) {
    // Title
    ctx.font = 'bold 40px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#543847';
    ctx.lineWidth = 5;
    ctx.strokeText('Flappy Bird', W / 2, 100);
    ctx.fillStyle = '#F8C83C';
    ctx.fillText('Flappy Bird', W / 2, 100);

    // Tap instruction
    ctx.font = 'bold 18px Arial';
    ctx.strokeStyle = '#543847';
    ctx.lineWidth = 3;
    ctx.strokeText('TAP / SPACE / CLICK', W / 2, GROUND_Y - 60);
    ctx.fillStyle = '#FFF';
    ctx.fillText('TAP / SPACE / CLICK', W / 2, GROUND_Y - 60);

    // Blinking arrow
    if (Math.floor(frameCount / 20) % 2 === 0) {
      ctx.strokeText('\u25B2', W / 2, GROUND_Y - 85);
      ctx.fillText('\u25B2', W / 2, GROUND_Y - 85);
    }
  }

  if (state === STATES.PLAYING) {
    drawScore(score, W / 2, 30, 40);
  }

  if (state === STATES.DEAD) {
    // Game Over text
    ctx.font = 'bold 34px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#543847';
    ctx.lineWidth = 5;
    ctx.strokeText('GAME OVER', W / 2, 110);
    ctx.fillStyle = '#FF4444';
    ctx.fillText('GAME OVER', W / 2, 110);

    drawScoreboard();

    // Restart prompt
    ctx.font = 'bold 16px Arial';
    ctx.strokeStyle = '#543847';
    ctx.lineWidth = 3;
    ctx.strokeText('TAP TO RESTART', W / 2, 310);
    ctx.fillStyle = '#FFF';
    ctx.fillText('TAP TO RESTART', W / 2, 310);
  }

  // Screen flash on death
  if (state === STATES.DYING) {
    ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, 0.6 - frameCount * 0.02) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

// Game loop
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

resetGame();
gameLoop();
</script>
</body>
</html>
